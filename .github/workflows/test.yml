name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module Pester -ListAvailable | Where-Object Version -ge '5.0')) {
              Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Install PSScriptAnalyzer
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module PSScriptAnalyzer -ListAvailable)) {
              Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          }

      - name: Run PSScriptAnalyzer
        run: |
          Import-Module PSScriptAnalyzer
          $files = @('.\PSSnips.psm1') + (Get-ChildItem .\Private, .\Public -Filter '*.ps1' -Recurse | Select-Object -ExpandProperty FullName)
          $results = $files | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Settings .\PSScriptAnalyzerSettings.psd1 }
          if ($results) {
              $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) issue(s)"
          }
          Write-Host "PSScriptAnalyzer: clean"

      - name: Validate module manifest
        run: |
          $m = Test-ModuleManifest .\PSSnips.psd1 -ErrorAction Stop
          Write-Host "Manifest valid: $($m.Name) v$($m.Version)"

      - name: Run Pester tests
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $config = New-PesterConfiguration
          $config.Run.Path = '.\PSSnips.Tests.ps1'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) test(s) failed"
          }

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pwsh
          path: TestResults.xml
