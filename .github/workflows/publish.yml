name: Publish to PowerShell Gallery

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    environment: psgallery   # requires environment protection rules + secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest version matches tag
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          $manifest = Test-ModuleManifest .\PSSnips.psd1
          if ($manifest.Version.ToString() -ne $tag) {
              throw "Tag version '$tag' does not match manifest version '$($manifest.Version)'. Update PSSnips.psd1 before tagging."
          }
          Write-Host "Version match: $tag ✓"

      - name: Install Pester and run tests (gate)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0
          $config = New-PesterConfiguration
          $config.Run.Path = '.\PSSnips.Tests.ps1'
          $config.Output.Verbosity = 'Normal'
          $result = Invoke-Pester -Configuration $config -PassThru
          if ($result.FailedCount -gt 0) { throw "Tests failed — aborting publish" }

      - name: Run PSScriptAnalyzer (gate)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $results = Invoke-ScriptAnalyzer -Path .\PSSnips.psm1 -Severity Error
          if ($results) { $results | Format-Table; throw "PSSA errors found — aborting publish" }

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path . -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose
          Write-Host "Published PSSnips ${{ github.ref_name }} to PowerShell Gallery ✓"
